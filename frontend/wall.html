<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeď</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<nav>
    <span class="nav-logo">// síť</span>
    <div class="nav-links">
        <a href="wall.html" class="nav-auth active">Zeď</a>
        <a href="users.html" class="nav-auth">Uživatelé</a>
        <a href="#" class="nav-auth" id="nav-username" style="color:var(--muted);cursor:default"></a>
        <a href="#" class="nav-auth btn btn-ghost btn-sm" onclick="logout()">Odhlásit</a>
    </div>
</nav>
    
<div class="container">

    <!-- Nový příspěvek -->
    <div class="new-post-card">
        <h3>Nový příspěvek</h3>
        <div class="alert" id="post-alert"></div>
        <div class="form-group">
            <input type="text" id="post-title" placeholder="Nadpis">
        </div>
        <div class="form-group">
            <textarea id="post-body" placeholder="Co se děje?"></textarea>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
            <label style="cursor:pointer;font-size:14px;color:var(--muted);margin:0;text-transform:none;letter-spacing:0">
                <input type="file" id="post-image" accept="image/*" style="display:none">
                <span id="file-label">📎 Přidat obrázek</span>
            </label>
            <button class="btn btn-primary btn-sm" id="btn-post" style="margin-left:auto">Zveřejnit</button>
        </div>
    </div>

    <!-- Feed -->
    <div id="feed">
        <div class="empty">Načítám příspěvky...</div>
    </div>
</div>

<script src="api.js"></script>
<script>
    requireAuth();
    setupNav();

    const currentUser = getUser();

    document.getElementById('post-image').addEventListener('change', function() {
        const name = this.files[0]?.name || 'Přidat obrázek';
        document.getElementById('file-label').textContent = '📎 ' + name;
    });

    async function loadFeed() {
        const feed = document.getElementById('feed');
        try {
            const posts = await apiFetch('/posts');
            if (posts.length === 0) {
                feed.innerHTML = '<div class="empty">Zatím žádné příspěvky.</div>';
                return;
            }
            feed.innerHTML = posts.map(p => renderPost(p)).join('');
            posts.forEach(p => loadComments(p.id));
        } catch (err) {
            feed.innerHTML = `<div class="empty">${err.message}</div>`;
        }
    }

    function renderPost(p) {
        const canDelete = p.author_id === currentUser.id;
        const initials = p.first_name[0] + p.last_name[0];

        return `
        <div class="post-card" id="post-${p.id}">
            <div class="post-header">
                <div class="avatar">${initials}</div>
                <div class="post-meta">
                    <div class="post-author">
                        <a href="user-detail.html?id=${p.author_id}">${p.first_name} ${p.last_name}</a>
                    </div>
                    <div class="post-date">${formatDate(p.created_at)}</div>
                </div>
                ${canDelete ? `<button class="btn btn-danger btn-sm" onclick="deletePost(${p.id})">Smazat</button>` : ''}
            </div>
            <div class="post-title">${p.title}</div>
            <div class="post-body">${p.body}</div>
            ${p.image ? `<img class="post-image" src="http://localhost:3000/uploads/${p.image}" alt="">` : ''}
            <div class="post-actions">
                <button class="like-btn" id="like-btn-${p.id}" onclick="toggleLike(${p.id})">
                    ♥ <span id="like-count-${p.id}">${p.like_count}</span>
                </button>
                <span class="comment-count" style="cursor:pointer" onclick="toggleLikesList(${p.id})">
                    zobrazit liky
                </span>
                <span class="comment-count">💬 ${p.comment_count}</span>
            </div>
            <div class="likes-list" id="likes-${p.id}"></div>
            <div class="comments-section" id="comments-${p.id}"></div>
            <div class="comment-form">
                <input type="text" placeholder="Přidat komentář..." id="comment-input-${p.id}"
                    onkeydown="if(event.key==='Enter') addComment(${p.id})">
                <button class="btn btn-ghost btn-sm" onclick="addComment(${p.id})">Odeslat</button>
            </div>
        </div>`;
    }

    async function loadComments(postId) {
        try {
            const data = await apiFetch(`/posts/${postId}`);
            const el = document.getElementById(`comments-${postId}`);
            if (!data.comments.length) { el.innerHTML = ''; return; }
            el.innerHTML = data.comments.map(c => `
                <div class="comment">
                    <div class="comment-body">
                        <div class="comment-author">
                            <a href="user-detail.html?id=${c.author_id}">${c.first_name} ${c.last_name}</a>
                        </div>
                        <div class="comment-text">${c.body}</div>
                        <div class="comment-date">${formatDate(c.created_at)}</div>
                    </div>
                    ${c.author_id === currentUser.id ? `<button class="btn btn-danger btn-sm" onclick="deleteComment(${postId}, ${c.id})">×</button>` : ''}
                </div>`).join('');
        } catch {}
    }

    async function toggleLike(postId) {
        const btn = document.getElementById(`like-btn-${postId}`);
        const countEl = document.getElementById(`like-count-${postId}`);
        try {
            const data = await apiFetch(`/posts/${postId}/likes`, { method: 'POST' });
            btn.classList.toggle('liked', data.liked);
            countEl.textContent = parseInt(countEl.textContent) + (data.liked ? 1 : -1);
        } catch {}
    }

    async function toggleLikesList(postId) {
        const el = document.getElementById(`likes-${postId}`);
        el.classList.toggle('open');
        if (el.classList.contains('open')) {
            try {
                const data = await apiFetch(`/posts/${postId}`);
                if (!data.likes.length) { el.innerHTML = 'Zatím žádné liky.'; return; }
                el.innerHTML = data.likes.map(l =>
                    `<span>♥ ${l.first_name} ${l.last_name} <small style="color:var(--muted)">${formatDate(l.created_at)}</small></span>`
                ).join('');
            } catch {}
        }
    }

    async function addComment(postId) {
        const input = document.getElementById(`comment-input-${postId}`);
        const body = input.value.trim();
        if (!body) return;
        try {
            await apiFetch(`/posts/${postId}/comments`, { method: 'POST', body: JSON.stringify({ body }) });
            input.value = '';
            loadComments(postId);
        } catch {}
    }

    async function deleteComment(postId, commentId) {
        try {
            await apiFetch(`/posts/${postId}/comments/${commentId}`, { method: 'DELETE' });
            loadComments(postId);
        } catch {}
    }

    async function deletePost(postId) {
        if (!confirm('Smazat příspěvek?')) return;
        try {
            await apiFetch(`/posts/${postId}`, { method: 'DELETE' });
            document.getElementById(`post-${postId}`).remove();
        } catch {}
    }

    document.getElementById('btn-post').addEventListener('click', async () => {
        const title = document.getElementById('post-title').value.trim();
        const body  = document.getElementById('post-body').value.trim();
        const alert = document.getElementById('post-alert');
        const btn   = document.getElementById('btn-post');

        if (!title || !body) return showAlert(alert, 'Vyplň nadpis a text.');

        btn.disabled = true;
        const image = document.getElementById('post-image').files[0];
        try {
            const fd = new FormData();
            fd.append('title', title);
            fd.append('body', body);
            if (image) fd.append('image', image);
            await apiFetch('/posts', { method: 'POST', body: fd });
            document.getElementById('post-title').value = '';
            document.getElementById('post-body').value = '';
            document.getElementById('post-image').value = '';
            document.getElementById('file-label').textContent = '📎 Přidat obrázek';
            alert.className = 'alert';
            await loadFeed();
        } catch (err) {
            showAlert(alert, err.message);
        }
        btn.disabled = false;
    });

    loadFeed();
</script>
</body>
</html>
